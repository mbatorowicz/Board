# Container Station (QNAP) — wklej ten plik przy tworzeniu aplikacji.
# File Station: /Container/Board — pliki projektu (w tym Dockerfile) bezpośrednio w tym folderze.

services:
  homepage:
    build:
      context: /Container/Board
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      ADMIN_PASSWORD: "ZMIEŃ-TO-HASLO"
      OFFICE_NAME: "Urząd Gminy"
      NODE_ENV: production
    volumes:
      - /Container/Board/data:/app/.data
    restart: unless-stopped
