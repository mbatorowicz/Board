# Container Station (QNAP) — wklej ten plik przy tworzeniu aplikacji.
# Pełna dokumentacja: docs/DEPLOYMENT.md (sekcja QNAP)
# Na QNAP z SSH możesz użyć zwykłego: ./board up

services:
  homepage:
    build:
      context: /share/Container/Board
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Ustaw ADMIN_PASSWORD w Advanced Settings → Environment (Container Station)
      OFFICE_NAME: "Urząd Gminy"
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=256"
      LINK_THUMBS: placeholder
    volumes:
      - /share/Container/Board/data:/app/.data
    restart: unless-stopped
