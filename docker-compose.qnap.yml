# Container Station (QNAP) — wklej ten plik przy tworzeniu aplikacji.
#
# File Station:  DataVol1 → Container → Board  (widok: /Container/Board)
# Docker (host): /share/Container/Board        ← ta ścieżka w context i volumes
#
# Jeśli build nadal nie widzi Dockerfile, spróbuj w context:
#   /share/CACHEDEV1_DATA/Container/Board

services:
  homepage:
    build:
      context: /share/Container/Board
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      ADMIN_PASSWORD: "ZMIEŃ-TO-HASLO"
      OFFICE_NAME: "Urząd Gminy"
      NODE_ENV: production
    volumes:
      - /share/Container/Board/data:/app/.data
    restart: unless-stopped
