# Alternatywny compose — gdy /share/Container/Board nie działa na Twoim QNAP.
# File Station: DataVol1 → Container → Board
# Użyj tego pliku zamiast docker-compose.qnap.yml w Container Station.

services:
  homepage:
    build:
      context: /share/CACHEDEV1_DATA/Container/Board
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      ADMIN_PASSWORD: "ZMIEŃ-TO-HASLO"
      OFFICE_NAME: "Urząd Gminy"
      NODE_ENV: production
    volumes:
      - /share/CACHEDEV1_DATA/Container/Board/data:/app/.data
    restart: unless-stopped
